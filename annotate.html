<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地图方向标注工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #eee;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
  }
  h1 { margin-bottom: 10px; font-size: 1.5rem; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 0.9rem; }
  .progress { color: #4fc3f7; margin-bottom: 15px; font-size: 1.1rem; }
  #dropZone {
    border: 2px dashed #4fc3f7; border-radius: 12px;
    padding: 40px 60px; text-align: center; cursor: pointer;
    transition: all 0.3s; margin-bottom: 20px;
  }
  #dropZone:hover, #dropZone.dragover {
    background: rgba(79,195,247,0.1); border-color: #29b6f6;
  }
  #dropZone p { color: #aaa; }
  #viewer {
    display: none; flex-direction: column; align-items: center;
    width: 100%; max-width: 600px;
  }
  #imageContainer {
    position: relative; width: 100%; max-width: 512px;
    aspect-ratio: 1; margin-bottom: 20px;
    border-radius: 8px; overflow: hidden; background: #16213e;
  }
  #targetImg {
    width: 100%; height: 100%; object-fit: contain;
    transition: transform 0.3s;
  }
  .rotate-hint {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px;
    font-size: 0.8rem; color: #ff9800;
  }
  .controls {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; width: 100%; max-width: 512px; margin-bottom: 20px;
  }
  .dir-btn {
    padding: 15px 8px; border: none; border-radius: 8px;
    background: #0f3460; color: #fff; font-size: 0.95rem;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .dir-btn:hover { background: #1a5fb4; transform: translateY(-2px); }
  .dir-btn:active { transform: translateY(0); }
  .dir-btn .angle { display: block; font-size: 1.3rem; font-weight: bold; }
  .dir-btn .label { display: block; font-size: 0.75rem; color: #aaa; margin-top: 2px; }
  .dir-btn.selected { background: #4caf50; }
  .actions {
    display: flex; gap: 10px; width: 100%; max-width: 512px;
  }
  .actions button {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; transition: all 0.15s;
  }
  #prevBtn { background: #555; color: #fff; }
  #skipBtn { background: #ff9800; color: #fff; }
  #nextBtn { background: #4caf50; color: #fff; }
  #downloadBtn {
    margin-top: 15px; padding: 12px 30px;
    background: #4fc3f7; color: #1a1a2e; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: bold;
    cursor: pointer; display: none;
  }
  .keyboard-hint {
    margin-top: 15px; color: #666; font-size: 0.8rem;
    text-align: center;
  }
  kbd {
    background: #333; padding: 2px 6px; border-radius: 4px;
    font-family: monospace; font-size: 0.85rem;
  }
</style>
</head>
<body>
<h1>🧭 地图方向标注工具</h1>
<p class="subtitle">选择图片文件夹，为每张地图截图标注旋转方向</p>
<p class="progress" id="progress">等待导入...</p>

<div id="dropZone">
  <p>📁 点击选择文件夹 或 拖拽图片到此处</p>
  <p style="font-size:0.8rem;margin-top:8px;">支持 .png .jpg .jpeg</p>
</div>

<div id="viewer">
  <div id="imageContainer">
    <img id="targetImg" src="" alt="待标注图片">
    <div class="rotate-hint">当前显示方向 = 标注方向</div>
  </div>

  <div class="controls">
    <button class="dir-btn" data-label="0" onclick="selectLabel(0)">
      <span class="angle">0°</span><span class="label">正北 ↑</span>
    </button>
    <button class="dir-btn" data-label="1" onclick="selectLabel(1)">
      <span class="angle">45°</span><span class="label">东北 ↗</span>
    </button>
    <button class="dir-btn" data-label="2" onclick="selectLabel(2)">
      <span class="angle">90°</span><span class="label">正东 →</span>
    </button>
    <button class="dir-btn" data-label="3" onclick="selectLabel(3)">
      <span class="angle">135°</span><span class="label">东南 ↘</span>
    </button>
    <button class="dir-btn" data-label="4" onclick="selectLabel(4)">
      <span class="angle">180°</span><span class="label">正南 ↓</span>
    </button>
    <button class="dir-btn" data-label="5" onclick="selectLabel(5)">
      <span class="angle">225°</span><span class="label">西南 ↙</span>
    </button>
    <button class="dir-btn" data-label="6" onclick="selectLabel(6)">
      <span class="angle">270°</span><span class="label">正西 ←</span>
    </button>
    <button class="dir-btn" data-label="7" onclick="selectLabel(7)">
      <span class="angle">315°</span><span class="label">西北 ↖</span>
    </button>
  </div>

  <div class="actions">
    <button id="prevBtn" onclick="prevImage()">← 上一张</button>
    <button id="skipBtn" onclick="skipImage()">跳过</button>
    <button id="nextBtn" onclick="nextImage()">下一张 →</button>
  </div>

  <p class="keyboard-hint">
    快捷键: <kbd>1</kbd>-<kbd>8</kbd> 选择方向 | <kbd>→</kbd>/<kbd>Space</kbd> 下一张 | <kbd>←</kbd> 上一张 | <kbd>S</kbd> 跳过
  </p>
</div>

<button id="downloadBtn" onclick="downloadLabels()">💾 下载标注结果 (labels.json)</button>

<script>
let images = [];
let currentIdx = 0;
let labels = {};
let currentLabel = null;

const dropZone = document.getElementById('dropZone');
const viewer = document.getElementById('viewer');
const targetImg = document.getElementById('targetImg');
const progress = document.getElementById('progress');
const downloadBtn = document.getElementById('downloadBtn');

// 拖拽导入
dropZone.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.webkitdirectory = true;
  input.directory = true;
  input.onchange = (e) => handleFiles(Array.from(e.target.files));
  input.click();
});

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f =>
    f.type.startsWith('image/') || /\.(png|jpe?g)$/i.test(f.name)
  );
  handleFiles(files);
});

function handleFiles(files) {
  images = files.filter(f => /\.(png|jpe?g)$/i.test(f.name)).sort((a,b) => a.name.localeCompare(b.name));
  if (images.length === 0) { alert('未找到图片文件'); return; }
  dropZone.style.display = 'none';
  viewer.style.display = 'flex';
  downloadBtn.style.display = 'inline-block';
  currentIdx = 0;
  labels = {};
  showImage(0);
}

function showImage(idx) {
  if (idx < 0 || idx >= images.length) return;
  currentIdx = idx;
  const file = images[idx];
  const url = URL.createObjectURL(file);
  targetImg.src = url;
  currentLabel = labels[file.name] !== undefined ? labels[file.name] : null;
  updateUI();
}

function updateUI() {
  const file = images[currentIdx];
  const status = labels[file.name] !== undefined ? `✓ 已标注: ${labels[file.name] * 45}°` : '未标注';
  progress.textContent = `图片 ${currentIdx + 1} / ${images.length} | ${status}`;

  document.querySelectorAll('.dir-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.label) === currentLabel);
  });

  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').textContent = currentIdx === images.length - 1 ? '完成 ✓' : '下一张 →';
}

function selectLabel(label) {
  const file = images[currentIdx];
  labels[file.name] = label;
  currentLabel = label;
  updateUI();
  // 自动下一张
  setTimeout(() => {
    if (currentIdx < images.length - 1) nextImage();
  }, 200);
}

function nextImage() {
  if (currentIdx < images.length - 1) showImage(currentIdx + 1);
  else {
    const annotated = Object.keys(labels).length;
    alert(`标注完成！共 ${annotated}/${images.length} 张已标注`);
  }
}

function prevImage() { if (currentIdx > 0) showImage(currentIdx - 1); }

function skipImage() {
  const file = images[currentIdx];
  delete labels[file.name];
  currentLabel = null;
  updateUI();
  if (currentIdx < images.length - 1) nextImage();
}

function downloadLabels() {
  const data = {
    total_images: images.length,
    annotated: Object.keys(labels).length,
    labels: labels
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'labels.json';
  a.click();
  URL.revokeObjectURL(url);
}

// 键盘快捷键
document.addEventListener('keydown', (e) => {
  if (viewer.style.display === 'none') return;
  if (e.key >= '1' && e.key <= '8') {
    e.preventDefault();
    selectLabel(parseInt(e.key) - 1);
  } else if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextImage();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    prevImage();
  } else if (e.key === 's' || e.key === 'S') {
    e.preventDefault();
    skipImage();
  }
});
</script>
</body>
</html>
